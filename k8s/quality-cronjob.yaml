apiVersion: batch/v1
kind: CronJob
metadata:
  name: quality-check
  namespace: liveklass
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: quality-check
              image: logpipeline-job:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-u", "quality/check_quality.py"]
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "300m"
                  memory: "256Mi"
